name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: cargo install cargo-release

      - name: Configure git user for cargo-release commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      # cargo-release runs test as pre-release check before bump.
      # Full test suite is already covered by ci.yml on every push/PR,
      # so this quick check serves as a final safety net, not a replacement.
      - run: cargo release "$BUMP" --no-publish --no-push --execute --no-confirm
        env:
          BUMP: ${{ inputs.bump }}

      # Validate the new version packages correctly before touching remote
      - run: cargo publish --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Push commit + tag only after dry-run passed — avoids dangling tag
      # on failed publish.
      - run: git push --follow-tags origin

      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
